<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <style>
        /* Skryjeme obsah, dokud neověříme práva */
        body { display: none; font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn-delete { color: red; }
    </style>
</head>
<body>

<h1>Admin panel</h1>
<p>Přihlášen jako: <strong id="admin-email">...</strong></p>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Role</th>
            <th>Akce</th>
        </tr>
    </thead>
    <tbody id="users-table-body">
        </tbody>
</table>

<br>
<a href="logout.php">Odhlásit se</a>

<script>
    async function loadAdminData() {
        try {
            const response = await fetch('api_admin.php');
            
            if (response.status === 403) {
                window.location.href = "login.html";
                return;
            }

            const data = await response.json();

            // 1. Nastavíme email admina
            document.getElementById('admin-email').textContent = data.admin_email;

            // 2. Vygenerujeme řádky tabulky
            const tableBody = document.getElementById('users-table-body');
            tableBody.innerHTML = ''; // Vyčistit tabulku

            data.users.forEach(user => {
                const row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.email}</td>
                        <td>${user.role}</td>
                        <td>
                            <a href="change_role.php?id=${user.id}&role=student">Student</a> |
                            <a href="change_role.php?id=${user.id}&role=teacher">Teacher</a> |
                            <a href="change_role.php?id=${user.id}&role=admin">Admin</a> |
                            <a href="delete_user.php?id=${user.id}" 
                               class="btn-delete"
                               onclick="return confirm('Opravdu chcete smazat tohoto uživatele?');">
                               Smazat
                            </a>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            // 3. Zobrazíme stránku
            document.body.style.display = 'block';

        } catch (error) {
            console.error("Chyba:", error);
            alert("Nepodařilo se načíst data.");
        }
    }

    // Spustíme načítání
    loadAdminData();
</script>

</body>
</html>
