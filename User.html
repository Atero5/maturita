<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÝLETOS</title>
    <link rel="stylesheet" href="Navbar.css">
    <link rel="stylesheet" href="User.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Skryjeme tělo stránky, dokud nevíme, zda je uživatel přihlášen */
        body { visibility: hidden; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="User.html" class="no-style-link">VÝLETOS</a></div>
        <ul class="menu">
            <li><button>Moje výlety</button></li>
            <li><button>Oblíbené výlety</button></li>
            <li class="user-menu">
                <button type="button" onclick="toggleMenu()">Profil</button>

                <div id="userDropdown" class="dropdown hidden">
                    <p>Přihlášen jako: <span id="user-email">... načítání</span></p>
                    <button class="logout-link" onclick="window.location.href='logout.php'">Odhlásit</button>      
                </div>
            </li>
        </ul>
    </nav>

    <main class="page-content">
        <section class="white-box">
            <h1>Výlety</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Hledat výlet podle názvu, místa..." autocomplete="off">
            </div>
            <hr>
            
            <div class="trips-grid" id="tripsContainer">
                <!-- Karty výletů budou zde vloženy dynamicky -->
            </div>
        </section>
    </main>

    <script src="navbar.js"></script>
    <script src="user.js"></script>

</body>
</html>
