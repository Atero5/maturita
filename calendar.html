<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÝLETOS - Kalendář</title>
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="calendar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { visibility: hidden; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="home_teacher.html" class="no-style-link">VÝLETOS</a></div>
        <ul class="menu">
            <li><button type="button" onclick="window.location.href='add_trip.html'">Přidat výlet</button></li>
            <li><button type="button">Výlety</button></li>
            <li><button type="button" onclick="window.location.href='gallery.html'">Fotogalerie</button></li>
            <li id="calendarBtn"><button type="button" onclick="window.location.href='calendar.html'" class="active-nav">Kalendář</button></li>
            <li class="user-menu">
                <button type="button" onclick="toggleMenu()">Profil</button>

                <div id="userDropdown" class="dropdown hidden">
                    <p>Přihlášen jako: <span id="user-email">... načítání</span></p>
                    <button class="logout-link" onclick="window.location.href='logout.php'">Odhlásit</button>      
                </div>
            </li>
        </ul>
    </nav>

    <main class="page-content">
        <section class="white-box">
            <h1>Kalendář</h1>
            <hr>
            
            <div class="calendar-container">
                <div id="calendarWidget">
                    <p style="text-align:center; color:#999;">Načítání...</p>
                </div>
                <aside class="task-panel">
                    <div class="task-panel-header">
                        <h2>Úkoly</h2>
                    </div>
                    <div class="task-panel-body">
                        <div class="task-field">
                            <label for="taskName">Název úkolu</label>
                            <input type="text" id="taskName" placeholder="Zadejte název úkolu">
                        </div>
                        <div class="task-field">
                            <label for="taskEndTime">Koncový čas</label>
                            <input type="time" id="taskEndTime">
                        </div>
                        <button class="btn-create-task" type="button">Vytvořit úkol</button>
                        <div class="tasks-list">
                            <h3>Seznam úkolů</h3>
                            <div id="tasksContainer" class="tasks-placeholder">
                                <p>Úkoly uvidíte zde.</p>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="navbar.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
