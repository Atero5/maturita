<!-- Modul pro úpravu výletu -->
<div class="modal-overlay" id="editTripModal">
    <div class="modal">
        <h2>Upravit výlet</h2>
        <input type="hidden" id="edit-trip-id">
        
        <label>Název výletu</label>
        <input type="text" id="edit-nazev">
        
        <label>Adresa ubytování</label>
        <input type="text" id="edit-adresa">
        
        <label>Délka pobytu</label>
        <input type="text" id="edit-delka">

        <label>Harmonogram</label>
        <textarea id="edit-harmonogram" rows="4"></textarea>

        <label>Učitelé</label>
        <input type="text" id="edit-ucitele">

        <h3>Doprava tam</h3>

        <label>Místo odjezdu (tam)</label>
        <input type="text" id="edit-misto">
        
        <label>Čas odjezdu (tam)</label>
        <input type="datetime-local" id="edit-cas">
        
        <label>Dopravní prostředek (tam)</label>
        <input type="text" id="edit-doprava">

        <h3>Doprava zpět</h3>

        <label>Místo odjezdu (zpět)</label>
        <input type="text" id="edit-misto-zpet">

        <label>Čas odjezdu (zpět)</label>
        <input type="datetime-local" id="edit-cas-zpet">

        <label>Dopravní prostředek (zpět)</label>
        <input type="text" id="edit-doprava-zpet">

        <h3>Finance</h3>
        
        <label>Celková cena (Kč)</label>
        <input type="number" id="edit-cena" min="0">

        <label>Číslo účtu</label>
        <input type="text" id="edit-cislo-uctu">
        
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveTrip()">Uložit</button>
            <button class="btn-cancel" onclick="closeEditModal()">Zrušit</button>
        </div>
    </div>
