<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÝLETOS - Registrace</title>
    <link rel="stylesheet" href="registration.css">
    <link rel="stylesheet" href="login_registration.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="registration">
    <h1>Registrace</h1>
    <hr>

    <form action="register.php" method="POST">
    <div class="field">
        <h3>E-mail:</h3>
        <input class="input" type="email" name = "email" placeholder="Zadejte E-mail..." required>
    </div>
    <div class="field">
        <h3>Heslo:</h3>
        <div class="password-wrapper">
            <input class="input" id="regPassword" type="password" name="password" placeholder="Zadejte heslo..." required>
            <button type="button" class="btn-toggle-pw" onclick="togglePassword('regPassword', this)" tabindex="-1">&#128065;</button>
        </div>
    </div>
    <div class="field">
        <h3>Potvrďte heslo:</h3>
        <div class="password-wrapper">
            <input class="input" id="regPasswordConfirm" type="password" name="confirm_password" placeholder="Zadejte heslo znovu..." required>
            <button type="button" class="btn-toggle-pw" onclick="togglePassword('regPasswordConfirm', this)" tabindex="-1">&#128065;</button>
        </div>
    </div>
    <div class="field">
        <h3>Třída:</h3>
        <select class="input" id="classSelect" name="class" onchange="updateRole()" required>
            <option value="">-- Vyberte svou třídu nebo roli --</option>
            <option value="V4A">V4A</option>
            <option value="V4B">V4B</option>
            <option value="V4C">V4C</option>
            <option value="S4A">S4A</option>
            <option value="S4B">S4B</option>
            <option value="S4C">S4C</option>
            <option value="teacher">Učitel</option>
        </select>
    </div>
    <div class="field" id="parentEmailField" style="display:none;">
        <h3>E-mail rodiče:</h3>
        <input class="input" type="email" name="parent_email" id="parentEmail" placeholder="Zadejte e-mail rodiče...">
    </div>
    <input type="hidden" id="roleInput" name="role" value="">
    <button class="btn_green" type="submit">zaregistrovat se</button>
    </form>
    <button class="btn_back" onclick="window.location.href='login.html'">zpět</button>
    </div>

    <script src="registration.js"></script>
</body>
</html>
