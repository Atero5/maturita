<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>přihlášení</title>
    <link rel="stylesheet" href="Login.css">
    <link rel="stylesheet" href="LoginRegistration.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="login">
        <h1>Přihlášení</h1>
        <hr>
        <div class="field">
            <h3>E-mail:</h3>
            <input class="input" type="email" placeholder="zadejte E-mail">
        </div>
        
        <div class="field">
            <h3>Heslo:</h3>
            <input class="input" type="password" placeholder="zadejte heslo">
        </div>
        <button class="btn_green">přihlásit se</button>
        <h6 class="link">Nemáte ještě svůj účet <a href="registration.html">vytvořte si jej</a>.</h6>
        
    </div>
</body>
</html>
