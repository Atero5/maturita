<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>přihlášení</title>
        <link rel="stylesheet" href="Login.css">
        <link rel="stylesheet" href="LoginRegistration.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    </head>

    <body>
        <div class="login">
            <h1>Přihlášení</h1>
            <hr>
            
            <div id="successMessage" class="success-message" style="display:none;">
                <p>✓ Registrace byla úspěšná! Nyní se můžete přihlásit.</p>
            </div>

            <form action="login.php" method="POST">

            <div class="field">
                <h3>E-mail:</h3>
                <input class="input" type="email" name = "email" placeholder="Zadejte E-mail..." required>
            </div>
            
            <div class="field">
                <h3>Heslo:</h3>
                <input class="input" name = "password" type="password" placeholder="Zadejte heslo..." required>
            </div>
            <button class="btn_green" type = "submit">přihlásit se</button>
            </form>
            <h6 class="link">Nemáte ještě svůj účet <a href="registration.html">zaregistrujte se</a>.</h6>
            
        </div>
        
        <script>
            // Zkontroluj, zda má URL parametr ?registered=true
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                const successMessage = document.getElementById('successMessage');
                if (successMessage) {
                    successMessage.style.display = 'block';
                }
                // Odstraň parametr z URL aby se nezobrazoval pokaždé
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        </script>
    </body>

</html>
