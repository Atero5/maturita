<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÝLETOS - Fotky z výletu</title>
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="trip_photos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="#" id="logo-link" class="no-style-link">VÝLETOS</a></div>
        <ul class="menu" id="navMenu">
            <li id="navAddTrip" style="display:none"><button type="button" onclick="window.location.href='add_trip.html'">Přidat výlet</button></li>
            <li><button type="button">Výlety</button></li>
            <li><button type="button" onclick="window.location.href='gallery.html'">Fotogalerie</button></li>
            <li id="calendarBtn" style="display:none"><button type="button" onclick="window.location.href='calendar.html'">Kalendář</button></li>
            <li class="user-menu">
                <button type="button" onclick="toggleMenu()">Profil</button>
                <div id="userDropdown" class="dropdown hidden">
                    <p>Přihlášen jako: <span id="user-email">... načítání</span></p>
                    <button class="logout-link" onclick="window.location.href='logout.php'">Odhlásit</button>
                </div>
            </li>
        </ul>
    </nav>

    <main class="page-content">
        <section class="white-box">
            <button class="btn-back" onclick="window.history.back()">&larr; Zpět</button>
            <h1 id="pageTitle">Fotky z výletu</h1>
            <hr>
            <div id="uploadSection" style="display:none;">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none;">
                    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📷 Vybrat fotky</button>
                    <span class="upload-hint">JPG, PNG, GIF, WEBP – max 10 MB / fotka</span>
                </div>
                <div id="uploadPreview" style="display:none;">
                    <div id="previewGrid" class="preview-grid"></div>
                    <div class="preview-actions">
                        <button class="btn-confirm-upload" onclick="confirmUpload()">Nahrát všechny</button>
                        <button class="btn-cancel-upload" onclick="cancelUpload()">Zrušit</button>
                    </div>
                </div>
                <div id="uploadStatus"></div>
            </div>

            <div id="uploadDisabled" style="display:none;">
                <p class="info-text">Fotky bude možné přidat po návratu z výletu.</p>
            </div>

            

            <div id="photosContainer">
                <p style="text-align:center; color:#999;">Načítání...</p>
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" style="display:none;" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightboxImg" src="" alt="Fotka">
        <p id="lightboxInfo" class="lightbox-info"></p>
    </div>

    <script src="navbar.js"></script>
    <script src="trip_photos.js"></script>
</body>
</html>
